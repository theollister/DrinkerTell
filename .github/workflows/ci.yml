name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: npx --yes html-validate drink-and-tell.html

      - name: Verify build step
        run: |
          mkdir _site
          cp drink-and-tell.html _site/index.html
