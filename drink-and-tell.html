<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mitchy Drinky Tells</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
<style>
:root {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;
  --radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --font-display:'Cabinet Grotesk',system-ui,sans-serif;
  --font-body:'Cabinet Grotesk',system-ui,sans-serif;
}
:root,[data-theme="dark"]{
  --color-bg:#0f0d12;--color-surface:#17141f;--color-surface-2:#1e1928;
  --color-surface-offset:#251f32;--color-border:oklch(0.7 0.05 290/0.15);
  --color-text:#f0eaf8;--color-text-muted:#9b92b0;--color-text-faint:#5c5470;
  --color-primary:#c084fc;--color-primary-hover:#a855f7;
  --color-primary-glow:oklch(0.7 0.25 290/0.35);
  --color-accent:#f472b6;--color-accent-glow:oklch(0.7 0.25 340/0.3);
  --color-teal:#34d399;--color-yellow:#fbbf24;--color-red:#f87171;
  --shadow-md:0 4px 24px oklch(0 0 0/0.4);
  --shadow-glow:0 0 40px var(--color-primary-glow);
}
[data-theme="light"]{
  --color-bg:#faf5ff;--color-surface:#f3e8ff;--color-surface-2:#ede9fe;
  --color-surface-offset:#ddd6fe;--color-border:oklch(0.4 0.1 290/0.15);
  --color-text:#1e0f2e;--color-text-muted:#6b4f8c;--color-text-faint:#a88bc4;
  --color-primary:#7c3aed;--color-primary-hover:#6d28d9;
  --color-primary-glow:oklch(0.5 0.25 290/0.2);
  --color-accent:#db2777;--color-accent-glow:oklch(0.5 0.25 340/0.2);
  --color-teal:#059669;--color-yellow:#d97706;--color-red:#dc2626;
  --shadow-md:0 4px 24px oklch(0.3 0.1 290/0.15);
  --shadow-glow:0 0 40px var(--color-primary-glow);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);overflow-x:hidden;user-select:none;-webkit-user-select:none;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
input{font:inherit;color:inherit;}
img{display:block;max-width:100%;}
*{transition:background var(--transition-interactive),color var(--transition-interactive),border-color var(--transition-interactive);}
.screen{display:none;min-height:100dvh;flex-direction:column;}
.screen.active{display:flex;}
#screen-home{align-items:center;justify-content:center;text-align:center;padding:var(--space-8) var(--space-6);gap:var(--space-6);background:radial-gradient(ellipse 80% 60% at 50% 0%,oklch(0.35 0.2 290/0.4) 0%,transparent 70%),var(--color-bg);}
.logo-mark{width:80px;height:80px;border-radius:var(--radius-2xl);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));display:flex;align-items:center;justify-content:center;font-size:2.5rem;box-shadow:var(--shadow-glow);animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.home-title{font-size:var(--text-2xl);font-weight:900;letter-spacing:-0.02em;line-height:1.1;}
.home-title span{background:linear-gradient(135deg,var(--color-primary),var(--color-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-subtitle{color:var(--color-text-muted);font-size:var(--text-base);max-width:32ch;}
.player-section{width:100%;max-width:400px;}
.section-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-muted);margin-bottom:var(--space-3);}
.player-chips{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-3);min-height:40px;}
.player-chip{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;}
.chip-remove{width:18px;height:18px;border-radius:50%;background:var(--color-surface-offset);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-muted);}
.chip-remove:hover{background:var(--color-red);color:white;}
.player-add-row{display:flex;gap:var(--space-2);}
.player-input{flex:1;padding:var(--space-3) var(--space-4);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);font-size:var(--text-sm);color:var(--color-text);outline:none;}
.player-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-glow);}
.player-input::placeholder{color:var(--color-text-faint);}
.btn-add-player{padding:var(--space-3) var(--space-4);background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-lg);font-size:var(--text-sm);font-weight:700;color:var(--color-primary);}
.btn-add-player:hover{background:var(--color-surface-offset);}
.btn-add-player:active{transform:scale(0.97);}
.category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2);width:100%;max-width:400px;}
.cat-btn{padding:var(--space-3) var(--space-2);border-radius:var(--radius-lg);border:2px solid var(--color-border);background:var(--color-surface);text-align:center;font-size:var(--text-xs);font-weight:700;display:flex;flex-direction:column;align-items:center;gap:var(--space-1);transition:all var(--transition-interactive);}
.cat-btn .cat-icon{font-size:1.4rem;}
.cat-btn.selected{border-color:var(--color-primary);background:oklch(from var(--color-primary) l c h/0.12);color:var(--color-primary);}
.cat-btn:active{transform:scale(0.96);}
.btn-primary{width:100%;max-width:400px;padding:var(--space-4);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));border:none;border-radius:var(--radius-xl);font-size:var(--text-lg);font-weight:800;color:white;letter-spacing:-0.01em;box-shadow:0 4px 20px var(--color-primary-glow);transition:all var(--transition-interactive);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--color-primary-glow);}
.btn-primary:active{transform:scale(0.98) translateY(0);}
.btn-primary:disabled{opacity:0.4;pointer-events:none;}
.theme-toggle{position:fixed;top:var(--space-4);right:var(--space-4);z-index:100;width:40px;height:40px;border-radius:var(--radius-full);background:var(--color-surface-2);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
#screen-game{padding:0;background:var(--color-bg);background-image:radial-gradient(ellipse 60% 40% at 50% 0%,oklch(0.35 0.2 290/0.2) 0%,transparent 60%);}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-5);flex-shrink:0;}
.game-header-left{display:flex;align-items:center;gap:var(--space-3);}
.btn-back{width:38px;height:38px;border-radius:var(--radius-full);background:var(--color-surface-2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.btn-back:hover{background:var(--color-surface-offset);}
.active-player-badge{padding:var(--space-2) var(--space-4);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:800;color:white;}
.round-counter{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:600;}
.category-pill{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);border:1px solid var(--color-border);font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);background:var(--color-surface);}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-5);gap:var(--space-6);}
.question-card{width:100%;max-width:380px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);padding:var(--space-8) var(--space-6);text-align:center;box-shadow:var(--shadow-md),0 0 60px var(--color-primary-glow);position:relative;overflow:hidden;}
.question-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,oklch(from var(--color-primary) l c h/0.06),transparent 60%);}
.question-category{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--color-primary);margin-bottom:var(--space-4);}
.question-text{font-size:var(--text-lg);font-weight:700;line-height:1.4;color:var(--color-text);margin-bottom:var(--space-6);}
.answer-options{display:flex;flex-direction:column;gap:var(--space-3);width:100%;}
.answer-btn{padding:var(--space-3) var(--space-5);border-radius:var(--radius-xl);border:2px solid var(--color-border);background:var(--color-surface-2);font-size:var(--text-sm);font-weight:700;text-align:center;transition:all var(--transition-interactive);cursor:pointer;position:relative;overflow:hidden;}
.answer-btn:hover{border-color:var(--color-primary);background:oklch(from var(--color-primary) l c h/0.1);}
.answer-btn:active{transform:scale(0.98);}
.answer-btn.selected{border-color:var(--color-primary);background:oklch(from var(--color-primary) l c h/0.18);color:var(--color-primary);}
.answer-btn:disabled{cursor:default;}
.guesses-section{width:100%;max-width:380px;}
.guesses-label{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-muted);margin-bottom:var(--space-3);text-align:center;}
.guess-rows{display:flex;flex-direction:column;gap:var(--space-2);}
.guess-row{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);}
.guess-row .guesser-name{font-size:var(--text-sm);font-weight:700;}
.guess-options{display:flex;gap:var(--space-2);}
.guess-option-btn{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);border:1.5px solid var(--color-border);font-size:var(--text-xs);font-weight:700;background:var(--color-surface-2);transition:all var(--transition-interactive);}
.guess-option-btn:hover{border-color:var(--color-primary);color:var(--color-primary);}
.guess-option-btn.chosen{border-color:var(--color-primary);background:oklch(from var(--color-primary) l c h/0.2);color:var(--color-primary);}
.guess-option-btn:disabled{cursor:default;}
.btn-reveal{width:100%;max-width:380px;padding:var(--space-4);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));border:none;border-radius:var(--radius-xl);font-size:var(--text-base);font-weight:800;color:white;box-shadow:0 4px 20px var(--color-primary-glow);transition:all var(--transition-interactive);}
.btn-reveal:hover{transform:translateY(-2px);}
.btn-reveal:active{transform:scale(0.98);}
.btn-reveal:disabled{opacity:0.4;pointer-events:none;}
#screen-reveal{align-items:center;justify-content:flex-start;padding:var(--space-6) var(--space-5);gap:var(--space-5);overflow-y:auto;background:var(--color-bg);background-image:radial-gradient(ellipse 80% 50% at 50% -10%,oklch(0.35 0.2 290/0.35) 0%,transparent 70%);}
.reveal-header{width:100%;text-align:center;}
.reveal-title{font-size:var(--text-xl);font-weight:900;margin-bottom:var(--space-2);}
.reveal-answer-box{width:100%;max-width:380px;padding:var(--space-5);background:linear-gradient(135deg,oklch(from var(--color-primary) l c h/0.15),oklch(from var(--color-accent) l c h/0.1));border:2px solid var(--color-primary);border-radius:var(--radius-2xl);text-align:center;}
.reveal-answer-label{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--color-primary);margin-bottom:var(--space-2);}
.reveal-answer-text{font-size:var(--text-lg);font-weight:800;}
.reveal-question-recap{font-size:var(--text-sm);color:var(--color-text-muted);max-width:340px;text-align:center;}
.results-list{width:100%;max-width:380px;display:flex;flex-direction:column;gap:var(--space-3);}
.result-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border-radius:var(--radius-xl);border:1px solid var(--color-border);}
.result-item.correct-guess{background:oklch(from var(--color-teal) l c h/0.1);border-color:var(--color-teal);}
.result-item.wrong-guess{background:oklch(from var(--color-red) l c h/0.08);border-color:var(--color-red);}
.result-emoji{font-size:1.4rem;flex-shrink:0;}
.result-info{flex:1;}
.result-name{font-size:var(--text-sm);font-weight:800;}
.result-detail{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;}
.drink-badge{padding:var(--space-1) var(--space-3);background:var(--color-red);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:800;color:white;animation:pulse-red 1.5s ease-in-out infinite;}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 oklch(from var(--color-red) l c h/0.4);}50%{box-shadow:0 0 0 6px oklch(from var(--color-red) l c h/0);}}
.safe-badge{padding:var(--space-1) var(--space-3);background:var(--color-teal);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:800;color:white;}
.btn-next{width:100%;max-width:380px;padding:var(--space-4);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));border:none;border-radius:var(--radius-xl);font-size:var(--text-base);font-weight:800;color:white;box-shadow:0 4px 20px var(--color-primary-glow);transition:all var(--transition-interactive);margin-top:auto;}
.btn-next:hover{transform:translateY(-2px);}
.btn-next:active{transform:scale(0.98);}
#screen-scores{align-items:center;justify-content:center;text-align:center;padding:var(--space-8) var(--space-6);gap:var(--space-5);background:radial-gradient(ellipse 80% 60% at 50% 0%,oklch(0.35 0.2 290/0.4) 0%,transparent 70%),var(--color-bg);}
.scores-title{font-size:var(--text-xl);font-weight:900;}
.scores-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);}
.scores-list{width:100%;max-width:380px;display:flex;flex-direction:column;gap:var(--space-3);}
.score-item{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-4) var(--space-5);border-radius:var(--radius-xl);background:var(--color-surface);border:1px solid var(--color-border);}
.score-rank{font-size:var(--text-xl);font-weight:900;color:var(--color-text-faint);width:2rem;flex-shrink:0;text-align:center;}
.score-rank.rank-1{color:var(--color-yellow);}
.score-rank.rank-2{color:var(--color-text-muted);}
.score-name{flex:1;font-size:var(--text-base);font-weight:700;text-align:left;}
.score-drinks{font-size:var(--text-sm);font-weight:800;padding:var(--space-1) var(--space-3);background:oklch(from var(--color-red) l c h/0.15);border-radius:var(--radius-full);color:var(--color-red);}
.btn-play-again{width:100%;max-width:380px;padding:var(--space-4);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));border:none;border-radius:var(--radius-xl);font-size:var(--text-lg);font-weight:800;color:white;box-shadow:0 4px 20px var(--color-primary-glow);transition:all var(--transition-interactive);}
.btn-play-again:hover{transform:translateY(-2px);}
.btn-play-again:active{transform:scale(0.98);}
.screen.active{animation:screenIn 0.3s cubic-bezier(0.16,1,0.3,1);}
@keyframes screenIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}}
</style>
</head>
<body>

<button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">🌙</button>

<div id="screen-home" class="screen active">
  <div class="logo-mark">🍻</div>
  <div>
    <h1 class="home-title">Mitchy Drinky <span>Tells</span></h1>
    <p class="home-subtitle">Answer taboo questions. Your friends guess. Wrong guessers drink!</p>
  </div>
  <div class="player-section">
    <div class="section-label">👥 Players (at least 2)</div>
    <div class="player-chips" id="player-chips"></div>
    <div class="player-add-row">
      <input class="player-input" id="player-input" type="text" placeholder="Enter player name..." maxlength="16" autocomplete="off" autocorrect="off">
      <button class="btn-add-player" id="btn-add-player">+ Add</button>
    </div>
  </div>
  <div class="player-section">
    <div class="section-label">🎲 Categories (pick at least 1)</div>
    <div class="category-grid" id="category-grid"></div>
  </div>
  <button class="btn-primary" id="btn-start" disabled>Let\'s Play! 🎉</button>
</div>

<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-header-left">
      <button class="btn-back" id="btn-back">←</button>
      <div class="active-player-badge" id="active-player-name">Player 1</div>
    </div>
    <div style="display:flex;align-items:center;gap:var(--space-3);">
      <span class="category-pill" id="active-category-pill">Love</span>
      <span class="round-counter" id="round-counter">Q 1</span>
    </div>
  </div>
  <div class="card-area" id="card-area"></div>
</div>

<div id="screen-reveal" class="screen">
  <div class="reveal-header">
    <div class="reveal-title" id="reveal-title">🎉 Revealed!</div>
  </div>
  <p class="reveal-question-recap" id="reveal-question-recap"></p>
  <div class="reveal-answer-box">
    <div class="reveal-answer-label">Their Answer</div>
    <div class="reveal-answer-text" id="reveal-answer-text"></div>
  </div>
  <div class="section-label" style="align-self:flex-start;width:100%;max-width:380px;">📊 Results</div>
  <div class="results-list" id="results-list"></div>
  <button class="btn-next" id="btn-next">Next Question ➜</button>
</div>

<div id="screen-scores" class="screen">
  <div style="font-size:3rem;">🏆</div>
  <h2 class="scores-title">Game Over!</h2>
  <p class="scores-subtitle">Here\'s who needs to sober up...</p>
  <div class="scores-list" id="scores-list"></div>
  <button class="btn-play-again" id="btn-play-again">Play Again 🔄</button>
</div>

<div class="confetti-container" id="confetti-container"></div>

<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d='dark';r.setAttribute('data-theme',d);
  if(t){t.innerHTML='🌙';t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);t.innerHTML=d==='dark'?'🌙':'☀️';});}
})();

const CATEGORIES=[
  {id:'love',label:'Love',icon:'💕'},
  {id:'spicy',label:'Spicy',icon:'🌶️'},
  {id:'ethics',label:'Ethics',icon:'⚖️'},
  {id:'personality',label:'Personality',icon:'🧠'},
  {id:'life',label:'Life & Death',icon:'☠️'},
  {id:'wild',label:'Wild Card',icon:'🃏'},
  {id:'nostalgia',label:'Nostalgia',icon:'📼'},
  {id:'opinions',label:'Hot Takes',icon:'🔥'},
  {id:'hypotheticals',label:'Would You?',icon:'🤔'},
];

const QUESTIONS={
  love:[
    {q:"What's most important to you in a relationship?",opts:["Physical attraction","Emotional connection","Shared interests","Loyalty"]},
    {q:"What's your love language?",opts:["Words of affirmation","Acts of service","Physical touch","Quality time"]},
    {q:"How would you want someone to propose to you?",opts:["Private & intimate","Big public gesture","Totally spontaneous","I'd rather propose"]},
    {q:"What's your ideal first date?",opts:["Dinner out","Netflix at home","Outdoor adventure","Bar hopping"]},
    {q:"Have you ever been the one to break someone's heart?",opts:["Yes, more than once","Yes, once","No, never","I plead the fifth"]},
    {q:"How many people have you genuinely been in love with?",opts:["Zero","One","Two or three","Four or more"]},
    {q:"Your biggest relationship deal-breaker is?",opts:["Bad hygiene","Lying","Jealousy","Financial irresponsibility"]},
    {q:"How long would you wait before becoming official with someone?",opts:["A few weeks","1-3 months","6 months+","I go with the flow"]},

let state={players:[],selectedCategories:[],currentPlayerIdx:0,drinkCounts:{},roundNum:1,totalRounds:20,currentQuestion:null,currentCategory:null,activePlayerAnswer:null,otherGuesses:{},usedQuestions:{}};

const screens={home:document.getElementById('screen-home'),game:document.getElementById('screen-game'),reveal:document.getElementById('screen-reveal'),scores:document.getElementById('screen-scores')};
function showScreen(name){Object.values(screens).forEach(s=>s.classList.remove('active'));screens[name].classList.add('active');}

const catGrid=document.getElementById('category-grid');
CATEGORIES.forEach(cat=>{
  const btn=document.createElement('button');
  btn.className='cat-btn';btn.dataset.id=cat.id;
  btn.innerHTML=`<span class="cat-icon">${cat.icon}</span><span>${cat.label}</span>`;
  btn.addEventListener('click',()=>{
    btn.classList.toggle('selected');
    const idx=state.selectedCategories.indexOf(cat.id);
    if(idx>=0)state.selectedCategories.splice(idx,1);else state.selectedCategories.push(cat.id);
    updateStartBtn();
  });
  catGrid.appendChild(btn);
});

function updateStartBtn(){document.getElementById('btn-start').disabled=state.players.length<2||state.selectedCategories.length===0;}

document.getElementById('btn-add-player').addEventListener('click',addPlayer);
document.getElementById('player-input').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer();});

function addPlayer(){
  const input=document.getElementById('player-input');
  const name=input.value.trim();
  if(!name||state.players.includes(name))return;
  state.players.push(name);input.value='';
  renderPlayerChips();updateStartBtn();
}

function renderPlayerChips(){
  const chips=document.getElementById('player-chips');chips.innerHTML='';
  state.players.forEach((p,i)=>{
    const chip=document.createElement('div');chip.className='player-chip';
    chip.innerHTML=`${p} <button class="chip-remove" data-i="${i}">✕</button>`;
    chip.querySelector('.chip-remove').addEventListener('click',()=>{state.players.splice(i,1);renderPlayerChips();updateStartBtn();});
    chips.appendChild(chip);
  });
}

document.getElementById('btn-start').addEventListener('click',startGame);

function startGame(){
  state.currentPlayerIdx=0;state.drinkCounts={};
  state.players.forEach(p=>state.drinkCounts[p]=0);
  state.roundNum=1;state.usedQuestions={};
  loadQuestion();showScreen('game');
}

document.getElementById('btn-back').addEventListener('click',()=>{
  if(confirm('Leave the game? Progress will be lost.'))showScreen('home');
});

function loadQuestion(){
  const catId=state.selectedCategories[Math.floor(Math.random()*state.selectedCategories.length)];
  state.currentCategory=catId;
  const pool=QUESTIONS[catId];
  const usedForCat=state.usedQuestions[catId]||[];
  const available=pool.filter((_,i)=>!usedForCat.includes(i));
  let idx;
  if(available.length===0){state.usedQuestions[catId]=[];idx=Math.floor(Math.random()*pool.length);}
  else{idx=pool.indexOf(available[Math.floor(Math.random()*available.length)]);}
  if(!state.usedQuestions[catId])state.usedQuestions[catId]=[];
  state.usedQuestions[catId].push(idx);
  state.currentQuestion=pool[idx];state.activePlayerAnswer=null;state.otherGuesses={};
  const activePlayer=state.players[state.currentPlayerIdx];
  const catInfo=CATEGORIES.find(c=>c.id===catId);
  document.getElementById('active-player-name').textContent=`${activePlayer}\'s turn`;
  document.getElementById('active-category-pill').textContent=`${catInfo.icon} ${catInfo.label}`;
  document.getElementById('round-counter').textContent=`Q ${state.roundNum}`;
  renderQuestionCard();
}

function renderQuestionCard(){
  const activePlayer=state.players[state.currentPlayerIdx];
  const q=state.currentQuestion;
  const catInfo=CATEGORIES.find(c=>c.id===state.currentCategory);
  const cardArea=document.getElementById('card-area');
  cardArea.innerHTML=`
    <div class="question-card">
      <div class="question-category">${catInfo.icon} ${catInfo.label}</div>
      <div class="question-text">${q.q}</div>
      <div class="answer-options" id="answer-options">
        ${q.opts.map((opt,i)=>`<button class="answer-btn" data-i="${i}">${opt}</button>`).join('')}
      </div>
    </div>
    <div style="text-align:center;color:var(--color-text-muted);font-size:var(--text-sm);max-width:280px;">
      <strong style="color:var(--color-primary)">${activePlayer}</strong>, pick your answer secretly. Others look away! 👀
    </div>`;
  document.querySelectorAll('.answer-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.i);state.activePlayerAnswer=i;
      document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      setTimeout(()=>renderGuessingPhase(),600);
    });
  });
}

function renderGuessingPhase(){
  const activePlayer=state.players[state.currentPlayerIdx];
  const q=state.currentQuestion;
  const catInfo=CATEGORIES.find(c=>c.id===state.currentCategory);
  const others=state.players.filter((_,i)=>i!==state.currentPlayerIdx);
  const cardArea=document.getElementById('card-area');
  cardArea.innerHTML=`
    <div class="question-card">
      <div class="question-category">${catInfo.icon} ${catInfo.label}</div>
      <div class="question-text">${q.q}</div>
    </div>
    <div class="guesses-section">
      <div class="guesses-label">What did <span style="color:var(--color-primary)">${activePlayer}</span> answer?</div>
      <div class="guess-rows" id="guess-rows">
        ${others.map(p=>`
          <div class="guess-row" data-player="${p}">
            <span class="guesser-name">${p}</span>
            <div class="guess-options">
              ${q.opts.map((opt,i)=>`<button class="guess-option-btn" data-player="${p}" data-i="${i}" title="${opt}">${String.fromCharCode(65+i)}</button>`).join('')}
            </div>
          </div>`).join('')}
      </div>
      <div style="margin-top:var(--space-3);font-size:var(--text-xs);color:var(--color-text-faint);text-align:center;">
        ${q.opts.map((o,i)=>`<strong>${String.fromCharCode(65+i)}:</strong> ${o}`).join(' &nbsp;|&nbsp; ')}
      </div>
    </div>
    <button class="btn-reveal" id="btn-reveal" disabled>Reveal Answer! 🎉</button>`;
  document.querySelectorAll('.guess-option-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const player=btn.dataset.player;const i=parseInt(btn.dataset.i);state.otherGuesses[player]=i;
      document.querySelectorAll(`.guess-option-btn[data-player="${player}"]`).forEach(b=>b.classList.remove('chosen'));
      btn.classList.add('chosen');
      const allGuessed=others.every(p=>state.otherGuesses[p]!==undefined);
      document.getElementById('btn-reveal').disabled=!allGuessed;
    });
  });
  document.getElementById('btn-reveal').addEventListener('click',showReveal);
}

function showReveal(){
  const activePlayer=state.players[state.currentPlayerIdx];
  const q=state.currentQuestion;
  const correctAns=q.opts[state.activePlayerAnswer];
  const others=state.players.filter((_,i)=>i!==state.currentPlayerIdx);
  document.getElementById('reveal-title').textContent=`${activePlayer} chose...`;
  document.getElementById('reveal-question-recap').textContent=q.q;
  document.getElementById('reveal-answer-text').textContent=`"${correctAns}"`;
  const resultsList=document.getElementById('results-list');resultsList.innerHTML='';
  let anyDrank=false;
  others.forEach(player=>{
    const guessIdx=state.otherGuesses[player];
    const correct=guessIdx===state.activePlayerAnswer;
    const item=document.createElement('div');
    item.className=`result-item ${correct?'correct-guess':'wrong-guess'}`;
    const guessText=q.opts[guessIdx]!==undefined?`"${q.opts[guessIdx]}"`:'—';
    item.innerHTML=`<div class="result-emoji">${correct?'✅':'😬'}</div><div class="result-info"><div class="result-name">${player}</div><div class="result-detail">Guessed: ${guessText}</div></div><div class="${correct?'safe-badge':'drink-badge'}">${correct?'😇 Safe':'🍺 Drink!'}</div>`;
    if(!correct){state.drinkCounts[player]=(state.drinkCounts[player]||0)+1;anyDrank=true;}
    resultsList.appendChild(item);
  });
  if(anyDrank)spawnConfetti('red');
  showScreen('reveal');
}

document.getElementById('btn-next').addEventListener('click',()=>{
  state.roundNum++;
  state.currentPlayerIdx=(state.currentPlayerIdx+1)%state.players.length;
  if(state.roundNum>state.totalRounds){showScores();}else{loadQuestion();showScreen('game');}
});

function showScores(){
  spawnConfetti('gold');
  const sorted=[...state.players].sort((a,b)=>(state.drinkCounts[b]||0)-(state.drinkCounts[a]||0));
  const list=document.getElementById('scores-list');list.innerHTML='';
  sorted.forEach((p,i)=>{
    const item=document.createElement('div');item.className='score-item';
    const rankCls=i===0?'rank-1':i===1?'rank-2':'';
    const emoji=i===0?'🏆':i===1?'🥈':i===2?'🥉':(i+1);
    item.innerHTML=`<div class="score-rank ${rankCls}">${emoji}</div><div class="score-name">${p}</div><div class="score-drinks">${state.drinkCounts[p]||0} drinks</div>`;
    list.appendChild(item);
  });
  showScreen('scores');
}

document.getElementById('btn-play-again').addEventListener('click',()=>{
  state.players=[];state.selectedCategories=[];state.drinkCounts={};
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  renderPlayerChips();updateStartBtn();showScreen('home');
});

function spawnConfetti(type){
  const container=document.getElementById('confetti-container');container.innerHTML='';
  const colors=type==='gold'?['#fbbf24','#f59e0b','#c084fc','#f472b6','#34d399','#60a5fa']:['#f87171','#fb923c','#fbbf24'];
  for(let i=0;i<60;i++){
    const piece=document.createElement('div');piece.className='confetti-piece';
    const color=colors[Math.floor(Math.random()*colors.length)];
    piece.style.cssText=`left:${Math.random()*100}%;background:${color};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    container.appendChild(piece);
  }
  setTimeout(()=>{container.innerHTML='';},4000);
}
